<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly Dictionary SPA</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <h1>📖 Wordly Dictionary</h1>

    <form id="search-form">
      <input
        type="text"
        id="word-input"
        placeholder="Search for a word..."
        required
      />
      <button type="submit">Search</button>
    </form>

    <div id="result"></div>

    <h3>⭐ Favorites</h3>
    <ul id="favorites"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
